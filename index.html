<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <link rel="stylesheet" href="style.css">
    <!-- 위젯 스크립트 로드 -->
    <script src="https://count.weniv.co.kr/static/js/hit-counter-widget.js"></script>
</head>
<body>
    <div class="card-container">
        <!-- 위젯 표시할 위치에 삽입 -->
        <div data-hit-counter data-url="https://sunryeo.github.io/Sunryeo-business-card" data-style="minimal" class="widget"></div>
        <img src="https://count.weniv.co.kr/api/v1/badge?url=https%3A%2F%2Fsunryeo.github.io%2FSunryeo-business-card%2F&label=hits" alt="Hits">
        <div class="card-flipper" id="cardFlipper">
            <div class="card-face card-front">
                <img src="위니브명함_앞.png" alt="명함 앞면" class="card-image">
            </div>
            <div class="card-face card-back">
                <img src="위니브명함_뒤.png" alt="명함 뒷면" class="card-image">
            </div>
        </div>
    </div>
    
    <button class="flip-button" onclick="flipCard()">
        <span id="buttonText">뒤집기 ↻</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
